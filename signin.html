<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In • EpisodeHQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="h3 fw-bold mb-2">Welcome back</h1>
            <p class="text-muted">Use the sign-in flow to access your TV tracker workspace.</p>
            <form id="signinForm" class="mt-4">
              <div class="mb-3">
                <label class="form-label" for="signinUsername">Username</label>
                <input id="signinUsername" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="signinPassword">Password</label>
                <input id="signinPassword" class="form-control" type="password" placeholder="The app uses a hashed cat password fallback">
              </div>
              <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
            </form>
            <div id="authMessage" class="alert alert-info mt-3 mb-0"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
